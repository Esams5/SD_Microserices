spring.application.name=cardapio-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardapio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cardapio_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cardapio_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


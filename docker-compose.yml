services:
  postgres-cardapio:
    image: postgres:16-alpine
    container_name: postgres-cardapio
    environment:
      POSTGRES_DB: cardapio_db
      POSTGRES_USER: cardapio_user
      POSTGRES_PASSWORD: cardapio_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_cardapio_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardapio_user -d cardapio_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-avaliacoes:
    image: postgres:16-alpine
    container_name: postgres-avaliacoes
    environment:
      POSTGRES_DB: avaliacoes_db
      POSTGRES_USER: avaliacoes_user
      POSTGRES_PASSWORD: avaliacoes_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_avaliacoes_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avaliacoes_user -d avaliacoes_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-compras:
    image: postgres:16-alpine
    container_name: postgres-compras
    environment:
      POSTGRES_DB: compras_db
      POSTGRES_USER: compras_user
      POSTGRES_PASSWORD: compras_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres_compras_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compras_user -d compras_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  cardapio-service:
    build:
      context: ./cardapio-service
    container_name: cardapio-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-cardapio:5432/cardapio_db
      SPRING_DATASOURCE_USERNAME: cardapio_user
      SPRING_DATASOURCE_PASSWORD: cardapio_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres-cardapio:
        condition: service_healthy

  avaliacoes-service:
    build:
      context: ./avaliacoes-service
    container_name: avaliacoes-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-avaliacoes:5432/avaliacoes_db
      SPRING_DATASOURCE_USERNAME: avaliacoes_user
      SPRING_DATASOURCE_PASSWORD: avaliacoes_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_SERVICE_URL: http://auth-service:8083/api/auth
    ports:
      - "8082:8082"
    depends_on:
      postgres-avaliacoes:
        condition: service_healthy
      auth-service:
        condition: service_started

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8083:8083"
    depends_on:
      postgres-auth:
        condition: service_healthy

  compras-service:
    build:
      context: ./compras-service
    container_name: compras-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-compras:5432/compras_db
      SPRING_DATASOURCE_USERNAME: compras_user
      SPRING_DATASOURCE_PASSWORD: compras_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AUTH_SERVICE_URL: http://auth-service:8083/api/auth
    ports:
      - "8084:8084"
    depends_on:
      postgres-compras:
        condition: service_healthy
      auth-service:
        condition: service_started

volumes:
  postgres_cardapio_data:
  postgres_avaliacoes_data:
  postgres_auth_data:
  postgres_compras_data:
